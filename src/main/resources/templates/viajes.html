<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes - BusProject</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0; top: 0; bottom: 0;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 2rem 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-brand h2 { color: #fff; font-size: 1.4rem; font-weight: 700; }
        .sidebar-brand p  { color: rgba(255,255,255,0.5); font-size: 0.75rem; margin-top: 0.25rem; }

        .sidebar-nav { flex: 1; padding: 1.5rem 0; }
        .nav-section-label {
            color: rgba(255,255,255,0.35);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.5rem 1.5rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 1.5rem;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .nav-item:hover  { color: #fff; background: rgba(255,255,255,0.07); border-left-color: #667eea; }
        .nav-item.active { color: #fff; background: rgba(102,126,234,0.2); border-left-color: #667eea; }

        .sidebar-footer { padding: 1.25rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-logout {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.7rem 1rem;
            background: rgba(220,38,38,0.15);
            border: 1px solid rgba(220,38,38,0.3);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(220,38,38,0.3); color: #fff; }

        .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }

        .topbar {
            background: #fff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .topbar h1 { font-size: 1.2rem; color: #1a1a2e; font-weight: 600; }
        .topbar-user { display: flex; align-items: center; gap: 0.6rem; color: #555; font-size: 0.88rem; }
        .avatar {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 0.8rem;
        }

        .content { padding: 2rem; flex: 1; }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f0f0f0;
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        thead th {
            background: #1a1a2e;
            color: #fff;
            padding: 0.85rem 1rem;
            text-align: left;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
        tbody tr:hover { background: #f0f4ff; }
        tbody td { padding: 0.8rem 1rem; color: #333; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.25rem;
            border-top: 1px solid #f0f0f0;
        }
        .btn-page {
            padding: 0.4rem 1rem;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            background: #1a1a2e;
            color: #fff;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .btn-page:disabled { background: #e5e5e5; border-color: #e5e5e5; color: #aaa; cursor: not-allowed; }
        .page-info { font-size: 0.85rem; color: #555; }

        .loading { text-align: center; padding: 2.5rem; color: #888; }

        .btn-primary {
            padding: 0.45rem 1.1rem;
            background: #667eea;
            border: none;
            border-radius: 7px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #5a6fd6; }

        .btn-view {
            padding: 0.3rem 0.8rem;
            background: #1a1a2e;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-view:hover { background: #0f3460; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 14px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            position: relative;
        }
        .modal h2 { font-size: 1.1rem; color: #1a1a2e; margin-bottom: 1.25rem; font-weight: 700; }
        .modal-close {
            position: absolute; top: 1rem; right: 1rem;
            background: none; border: none; font-size: 1.3rem;
            cursor: pointer; color: #888; line-height: 1;
        }
        .modal-close:hover { color: #333; }
        .field { margin-bottom: 0.85rem; display: flex; gap: 0.5rem; }
        .field label { font-weight: 600; color: #555; font-size: 0.85rem; min-width: 160px; }
        .field span  { color: #222; font-size: 0.85rem; }

        /* Form styles */
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.35rem;
        }
        .form-group input[type="text"],
        .form-group input[type="datetime-local"],
        .form-group select {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            font-size: 0.88rem;
            color: #222;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input[type="text"]:focus,
        .form-group input[type="datetime-local"]:focus,
        .form-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
            background: #fff;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }
        .btn-cancel {
            padding: 0.45rem 1.1rem;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            color: #555;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: #e5e7eb; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h2>BusProject</h2>
        <p>Sistema de Gestión</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>
        <a href="/dashboard" class="nav-item">Dashboard</a>

        <div class="nav-section-label" style="margin-top:1rem;">Gestión</div>
        <a href="/buses" class="nav-item">Buses</a>
        <a href="/viajes" class="nav-item active">Viajes</a>

        <div class="nav-section-label" style="margin-top:1rem;">Sistema</div>
        <a href="#" class="nav-item">Configuración</a>
    </nav>
    <div class="sidebar-footer">
        <a href="/logout" class="btn-logout">Cerrar Sesión</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <h1>Viajes</h1>
        <div class="topbar-user">
            <div class="avatar">A</div>
            <span>Administrador</span>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <div class="card-header">
                <span>Lista de Viajes</span>
                <button class="btn-primary" onclick="openCreateModal()">Crear Viaje</button>
            </div>
            <div id="table-wrap">
                <p class="loading">Cargando viajes...</p>
            </div>
            <div class="pagination">
                <button class="btn-page" id="btn-prev" onclick="changePage(-1)" disabled>Anterior</button>
                <span class="page-info" id="page-info">Página 1</span>
                <button class="btn-page" id="btn-next" onclick="changePage(1)">Siguiente</button>
            </div>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="viaje-detail-overlay" onclick="closeDetailModal(event)">
    <div class="modal">
        <button class="modal-close" onclick="closeDetailModalDirect()">&#x2715;</button>
        <h2>Detalle del Viaje</h2>
        <div id="detail-body"></div>
    </div>
</div>

<!-- Create Viaje Modal -->
<div class="modal-overlay" id="create-viaje-overlay" onclick="closeCreateModal(event)">
    <div class="modal">
        <button class="modal-close" onclick="closeCreateModalDirect()">&#x2715;</button>
        <h2>Crear Viaje</h2>
        <form id="create-viaje-form" onsubmit="submitViaje(event)">
            <div class="form-group">
                <label for="origen">Origen</label>
                <input type="text" id="origen" name="origen" required placeholder="Ej: Lima">
            </div>
            <div class="form-group">
                <label for="destino">Destino</label>
                <input type="text" id="destino" name="destino" required placeholder="Ej: Arequipa">
            </div>
            <div class="form-group">
                <label for="fechaHoraSalida">Fecha y Hora Salida</label>
                <input type="datetime-local" id="fechaHoraSalida" name="fechaHoraSalida" required>
            </div>
            <div class="form-group">
                <label for="fechaHoraLlegadaEstimada">Fecha y Hora Llegada Estimada</label>
                <input type="datetime-local" id="fechaHoraLlegadaEstimada" name="fechaHoraLlegadaEstimada" required>
            </div>
            <div class="form-group">
                <label for="busSelect">Bus</label>
                <select id="busSelect" name="busId" required>
                    <option value="">Cargando buses...</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="closeCreateModalDirect()">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script>
    var currentPage = 0;
    var totalPages = 1;

    function loadViajes(page) {
        fetch('/viaje?page=' + page + '&size=10')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                totalPages = data.totalPages || 1;
                currentPage = data.number || 0;
                renderViajeTable(data.content || []);
                document.getElementById('page-info').textContent =
                    'Página ' + (currentPage + 1) + ' de ' + totalPages;
                document.getElementById('btn-prev').disabled = currentPage === 0;
                document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;
            })
            .catch(function() {
                document.getElementById('table-wrap').innerHTML =
                    '<p class="loading" style="color:#c0392b">Error al cargar los viajes.</p>';
            });
    }

    function renderViajeTable(viajes) {
        if (viajes.length === 0) {
            document.getElementById('table-wrap').innerHTML =
                '<p class="loading">No hay viajes registrados.</p>';
            return;
        }
        var html = '<table><thead><tr>' +
            '<th>Origen</th><th>Destino</th><th>Fecha Salida</th>' +
            '<th>Fecha Llegada Est.</th><th>Bus</th><th>Accion</th>' +
            '</tr></thead><tbody>';
        viajes.forEach(function(v) {
            var salida = v.fechaHoraSalida
                ? new Date(v.fechaHoraSalida).toLocaleString('es-PE')
                : '-';
            var llegada = v.fechaHoraLlegadaEstimada
                ? new Date(v.fechaHoraLlegadaEstimada).toLocaleString('es-PE')
                : '-';
            var bus = v.bus
                ? (v.bus.numeroBus + ' - ' + v.bus.placa)
                : '-';
            html += '<tr>' +
                '<td>' + (v.origen || '-') + '</td>' +
                '<td>' + (v.destino || '-') + '</td>' +
                '<td>' + salida + '</td>' +
                '<td>' + llegada + '</td>' +
                '<td>' + bus + '</td>' +
                '<td><button class="btn-view" onclick="openDetail(' + v.id + ')">Visualizar</button></td>' +
                '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('table-wrap').innerHTML = html;
    }

    function changePage(dir) {
        loadViajes(currentPage + dir);
    }

    function detailField(label, value) {
        return '<div class="field"><label>' + label + ':</label><span>' + value + '</span></div>';
    }

    function openDetail(id) {
        fetch('/viaje/' + id)
            .then(function(r) { return r.json(); })
            .then(function(v) {
                var salida = v.fechaHoraSalida
                    ? new Date(v.fechaHoraSalida).toLocaleString('es-PE')
                    : '-';
                var llegada = v.fechaHoraLlegadaEstimada
                    ? new Date(v.fechaHoraLlegadaEstimada).toLocaleString('es-PE')
                    : '-';
                var busInfo = '-';
                var marcaInfo = '-';
                if (v.bus) {
                    busInfo = v.bus.numeroBus + ' - ' + v.bus.placa;
                    marcaInfo = v.bus.marca ? v.bus.marca.nombre : '-';
                }
                document.getElementById('detail-body').innerHTML =
                    detailField('Origen', v.origen || '-') +
                    detailField('Destino', v.destino || '-') +
                    detailField('Fecha Salida', salida) +
                    detailField('Fecha Llegada Est.', llegada) +
                    detailField('Bus', busInfo) +
                    detailField('Marca', marcaInfo);
                document.getElementById('viaje-detail-overlay').classList.add('open');
            })
            .catch(function() {
                alert('Error al cargar el detalle del viaje.');
            });
    }

    function closeDetailModal(e) {
        if (e.target === document.getElementById('viaje-detail-overlay')) closeDetailModalDirect();
    }

    function closeDetailModalDirect() {
        document.getElementById('viaje-detail-overlay').classList.remove('open');
    }

    /* Create Viaje Modal */
    function openCreateModal() {
        var select = document.getElementById('busSelect');
        select.innerHTML = '<option value="">Cargando buses...</option>';
        fetch('/bus/all')
            .then(function(r) { return r.json(); })
            .then(function(buses) {
                select.innerHTML = '<option value="">Seleccione un bus</option>';
                buses.forEach(function(b) {
                    var opt = document.createElement('option');
                    opt.value = b.id;
                    opt.textContent = b.numeroBus + ' - ' + b.placa;
                    select.appendChild(opt);
                });
            })
            .catch(function() {
                select.innerHTML = '<option value="">Error al cargar buses</option>';
            });
        document.getElementById('create-viaje-overlay').classList.add('open');
    }

    function closeCreateModal(e) {
        if (e.target === document.getElementById('create-viaje-overlay')) closeCreateModalDirect();
    }

    function closeCreateModalDirect() {
        document.getElementById('create-viaje-overlay').classList.remove('open');
        document.getElementById('create-viaje-form').reset();
    }

    function submitViaje(event) {
        event.preventDefault();
        var form = document.getElementById('create-viaje-form');
        var payload = {
            origen: form.origen.value.trim(),
            destino: form.destino.value.trim(),
            fechaHoraSalida: form.fechaHoraSalida.value,
            fechaHoraLlegadaEstimada: form.fechaHoraLlegadaEstimada.value,
            busId: form.busId.value
        };
        fetch('/viaje', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(r) {
            if (!r.ok) throw new Error('Error al crear el viaje');
            closeCreateModalDirect();
            loadViajes(0);
        })
        .catch(function(err) {
            alert(err.message);
        });
    }

    loadViajes(0);
</script>
</body>
</html>
